<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🥕 阿寶學院</title>
<style>
  :root {
    --cream: #fdf9f3;
    --carrot: #ff9556;
    --brown: #3a2a1a;
    --card: #ffffff;
    --soft-shadow: 0 2px 10px rgba(58, 42, 26, 0.08);
    --tag-bg: #fff2e6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--cream);
    color: var(--brown);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    line-height: 1.65;
    padding: 28px 18px 56px;
    max-width: 640px;
    margin: 0 auto;
    min-height: 100vh;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  h1 {
    font-size: 32px;
    color: var(--carrot);
    letter-spacing: 3px;
    font-weight: 700;
  }
  .subtitle {
    font-size: 14px;
    color: var(--brown);
    opacity: 0.6;
    margin-top: 10px;
  }
  main.lessons {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  a.lesson-card {
    background: var(--card);
    border-radius: 18px;
    padding: 20px 22px;
    box-shadow: var(--soft-shadow);
    text-decoration: none;
    color: var(--brown);
    display: block;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  a.lesson-card:active {
    transform: scale(0.98);
    box-shadow: 0 1px 4px rgba(58, 42, 26, 0.12);
  }
  .lesson-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    opacity: 0.72;
  }
  .lesson-line {
    display: inline-block;
    padding: 2px 10px;
    background: var(--tag-bg);
    border-radius: 999px;
    font-size: 12px;
    color: var(--carrot);
    font-weight: 600;
  }
  .lesson-topic {
    font-size: 17px;
    font-weight: 600;
    margin-top: 8px;
    line-height: 1.4;
  }
  .empty {
    text-align: center;
    padding: 56px 20px;
    opacity: 0.5;
    font-size: 15px;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--soft-shadow);
  }
</style>
</head>
<body>
<header>
  <h1>🥕 阿寶學院</h1>
  <div class="subtitle">每晚 00:30 自動更新</div>
</header>
<main class="lessons">
  <a class="lesson-card" href="lessons/2026-07-11.html">
    <div class="lesson-meta">
      <span>📅 2026-07-11 週六</span>
      <span class="lesson-line">⚔️ W3</span>
    </div>
    <div class="lesson-topic">Evals 入門</div>
  </a>
  <a class="lesson-card" href="lessons/2026-07-10.html">
    <div class="lesson-meta">
      <span>📅 2026-07-10 週五</span>
      <span class="lesson-line">🩺 W2</span>
    </div>
    <div class="lesson-topic">自動化偏誤與警示疲勞</div>
  </a>
  <a class="lesson-card" href="lessons/2026-07-09.html">
    <div class="lesson-meta">
      <span>📅 2026-07-09 週四</span>
      <span class="lesson-line">⚔️ W2</span>
    </div>
    <div class="lesson-topic">失效分類學</div>
  </a>
  <a class="lesson-card" href="lessons/2026-07-08.html">
    <div class="lesson-meta">
      <span>📅 2026-07-08 週三</span>
      <span class="lesson-line">🩺 W1</span>
    </div>
    <div class="lesson-topic">失效模式全景</div>
  </a>
</main>
</body>
</html>
